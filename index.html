<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <title>Rocky - Geology Assistant</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Rocky mascot favicon: stone robot with miner helmet & glowing eyes -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%230E0E12'/%3E%3Cellipse cx='32' cy='22' rx='16' ry='10' fill='%23C97A3A'/%3E%3Crect x='18' y='18' width='28' height='6' rx='3' fill='%23E8A84B'/%3E%3Ccircle cx='32' cy='15' r='5' fill='%23FFD700'/%3E%3Ccircle cx='32' cy='15' r='2.5' fill='%23FFFDE0'/%3E%3Cellipse cx='32' cy='35' rx='12' ry='10' fill='%23888'/%3E%3Cellipse cx='32' cy='35' rx='10' ry='8' fill='%23222'/%3E%3Cellipse cx='27' cy='34' rx='3' ry='4' fill='%2300FF66'/%3E%3Cellipse cx='37' cy='34' rx='3' ry='4' fill='%2300FF66'/%3E%3Cellipse cx='27' cy='34' rx='1.5' ry='2' fill='%2390FFB0'/%3E%3Cellipse cx='37' cy='34' rx='1.5' ry='2' fill='%2390FFB0'/%3E%3Cpath d='M26 42 Q32 47 38 42' stroke='%23C97A3A' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ═══ DARK THEME (default) ═══ */
    :root, [data-theme="dark"] {
      --bg-page: #0E0E12;
      --bg-container: #161620;
      --bg-header-start: rgba(30,30,46,0.98);
      --bg-header-end: rgba(22,22,32,0.98);
      --bg-chat: #0E0E12;
      --bg-input-area: #161620;
      --bg-input: rgba(255,255,255,0.04);
      --bg-input-focus: rgba(255,255,255,0.06);
      --bg-bubble-bot: #1E1E2E;
      --bg-bubble-user-a: rgba(201,122,58,0.18);
      --bg-bubble-user-b: rgba(232,168,75,0.12);
      --bg-btn: rgba(255,255,255,0.05);
      --bg-btn-hover: rgba(201,122,58,0.15);
      --bg-suggestion: rgba(255,255,255,0.03);
      --bg-suggestion-hover: rgba(201,122,58,0.08);
      --bg-dropdown: #1E1E2E;
      --bg-brand-icon: linear-gradient(135deg,#2A1A0A,#3D2510);
      --bg-empty-icon: linear-gradient(135deg,#1E1810,#2A2010);

      --border-container: rgba(201,122,58,0.2);
      --border-header: rgba(201,122,58,0.25);
      --border-btn: rgba(255,255,255,0.1);
      --border-btn-hover: rgba(201,122,58,0.4);
      --border-input: rgba(255,255,255,0.1);
      --border-input-focus: rgba(201,122,58,0.5);
      --border-bubble-bot: rgba(255,255,255,0.06);
      --border-bubble-user: rgba(201,122,58,0.3);
      --border-brand: rgba(201,122,58,0.5);
      --border-dropdown: rgba(201,122,58,0.3);
      --border-suggestion: rgba(255,255,255,0.07);
      --border-suggestion-hover: rgba(201,122,58,0.3);
      --border-input-area: rgba(201,122,58,0.15);

      --text-primary: #F0EBE0;
      --text-secondary: #B0A8A0;
      --text-muted: #6A6070;
      --text-heading: #F0EBE0;
      --text-btn: #B0A8A0;
      --text-btn-hover: #E8A84B;
      --text-sub: #8A8090;
      --text-suggestion: #B0A8A0;
      --text-suggestion-hover: #F0EBE0;

      --radial1: rgba(201,122,58,0.08);
      --radial2: rgba(90,143,168,0.06);
      --radial3: rgba(14,14,18,0.9);
      --scrollbar: #3A3A4E;
      --scrollbar-hover: #8A8090;
      --shadow-deep: 0 8px 32px rgba(0,0,0,0.6);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --glow-copper: 0 0 20px rgba(201,122,58,0.3);
      --glow-amber: 0 0 30px rgba(232,168,75,0.2);
    }

    /* ═══ LIGHT THEME ═══ */
    [data-theme="light"] {
      --bg-page: #EDE8DF;
      --bg-container: #FDFAF5;
      --bg-header-start: rgba(255,252,246,0.98);
      --bg-header-end: rgba(248,244,236,0.98);
      --bg-chat: #F5F0E8;
      --bg-input-area: #FDFAF5;
      --bg-input: rgba(0,0,0,0.04);
      --bg-input-focus: rgba(0,0,0,0.06);
      --bg-bubble-bot: #FFFFFF;
      --bg-bubble-user-a: rgba(201,122,58,0.1);
      --bg-bubble-user-b: rgba(232,168,75,0.07);
      --bg-btn: rgba(0,0,0,0.04);
      --bg-btn-hover: rgba(201,122,58,0.1);
      --bg-suggestion: rgba(0,0,0,0.025);
      --bg-suggestion-hover: rgba(201,122,58,0.06);
      --bg-dropdown: #FDFAF5;
      --bg-brand-icon: linear-gradient(135deg,#F5E6D0,#EDD5B0);
      --bg-empty-icon: linear-gradient(135deg,#F5E6D0,#EDD5B0);

      --border-container: rgba(201,122,58,0.18);
      --border-header: rgba(201,122,58,0.12);
      --border-btn: rgba(0,0,0,0.1);
      --border-btn-hover: rgba(201,122,58,0.4);
      --border-input: rgba(0,0,0,0.12);
      --border-input-focus: rgba(201,122,58,0.5);
      --border-bubble-bot: rgba(0,0,0,0.06);
      --border-bubble-user: rgba(201,122,58,0.22);
      --border-brand: rgba(201,122,58,0.4);
      --border-dropdown: rgba(201,122,58,0.2);
      --border-suggestion: rgba(0,0,0,0.08);
      --border-suggestion-hover: rgba(201,122,58,0.3);
      --border-input-area: rgba(201,122,58,0.1);

      --text-primary: #2D2416;
      --text-secondary: #5A4A38;
      --text-muted: #9A8878;
      --text-heading: #1E1410;
      --text-btn: #5A4A38;
      --text-btn-hover: #C97A3A;
      --text-sub: #8A7060;
      --text-suggestion: #5A4A38;
      --text-suggestion-hover: #2D2416;

      --radial1: rgba(201,122,58,0.05);
      --radial2: rgba(90,143,168,0.04);
      --radial3: rgba(237,232,223,0.7);
      --scrollbar: #C8B8A0;
      --scrollbar-hover: #A89070;
      --shadow-deep: 0 8px 32px rgba(0,0,0,0.1);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --glow-copper: 0 0 20px rgba(201,122,58,0.12);
      --glow-amber: 0 0 30px rgba(232,168,75,0.08);
    }

    /* ═══ BASE ═══ */
    --mineral-copper: #C97A3A;
    --fossil-gold: #E8A84B;
    --amber-glow: #F5C76A;
    --crystal-blue: #5A8FA8;
    --emerald-vein: #2ECC71;

    * { margin:0; padding:0; box-sizing:border-box; }

    *, *::before, *::after { box-sizing: border-box; }

    html {
      height: 100%;
      height: -webkit-fill-available;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-page);
      margin: 0;
      padding: 20px;
      min-height: 100%;
      min-height: -webkit-fill-available;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      transition: background 0.35s ease;
    }

    body::before {
      content:'';
      position:fixed; inset:0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, var(--radial1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 20%, var(--radial2) 0%, transparent 50%),
        radial-gradient(ellipse 100% 80% at 50% 100%, var(--radial3) 0%, transparent 70%);
      pointer-events:none; z-index:0;
      transition: all 0.35s ease;
    }

    .container {
      background: var(--bg-container);
      border: 1px solid var(--border-container);
      border-radius: 24px;
      box-shadow: var(--shadow-deep), 0 0 0 1px rgba(255,255,255,0.03), var(--glow-amber);
      width: 100%; max-width: 980px; height: calc(100vh - 40px); height: calc(100dvh - 40px);
      display: flex; flex-direction: column;
      overflow: hidden; position: relative; z-index: 1;
      transition: background 0.35s, box-shadow 0.35s;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, var(--bg-header-start), var(--bg-header-end));
      padding: 26px 36px 22px;
      border-bottom: 1px solid var(--border-header);
      display: flex; justify-content: space-between; align-items: center;
      position: relative; z-index: 10;
      border-radius: 24px 24px 0 0;
      overflow: visible;
      transition: background 0.35s;
    }

    .header::after {
      content:'';
      position:absolute; bottom:0; left:36px; right:36px; height:1px;
      background: linear-gradient(90deg, transparent, #C97A3A, #E8A84B, #C97A3A, transparent);
      opacity:0.5;
    }

    .header-brand { display:flex; align-items:center; gap:16px; }

    .brand-icon {
      width:48px; height:48px;
      background: var(--bg-brand-icon);
      border: 1.5px solid var(--border-brand);
      border-radius: 14px;
      display:flex; align-items:center; justify-content:center;
      font-size:26px;
      box-shadow: var(--glow-copper), inset 0 1px 0 rgba(255,255,255,0.1);
      flex-shrink:0;
      transition: background 0.35s;
    }

    .brand-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 900;
      color: var(--text-heading);
      letter-spacing: -0.5px; line-height: 1;
      transition: color 0.35s;
    }

    .brand-text h1 span {
      background: linear-gradient(135deg, #C97A3A, #F5C76A);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    .brand-text p {
      font-size:13px; color: var(--text-sub);
      margin-top:4px; font-weight:300; letter-spacing:0.5px;
      transition: color 0.35s;
    }

    .status-dot {
      display:inline-block; width:6px; height:6px;
      background:#2ECC71; border-radius:50%;
      margin-right:6px; box-shadow:0 0 6px #2ECC71;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .header-controls { display:flex; gap:10px; align-items:center; position:relative; z-index:100; }

    .icon-btn {
      padding: 9px 18px;
      background: var(--bg-btn);
      color: var(--text-btn);
      border: 1px solid var(--border-btn);
      border-radius: 10px; cursor:pointer;
      font-size:13px; font-weight:500; font-family:'DM Sans',sans-serif;
      transition: all 0.2s;
      display:flex; align-items:center; gap:7px;
      white-space:nowrap; letter-spacing:0.3px;
    }
    .icon-btn:hover {
      background: var(--bg-btn-hover);
      border-color: var(--border-btn-hover);
      color: var(--text-btn-hover);
      transform: translateY(-1px);
    }
    .theme-btn { padding: 9px 13px; font-size:17px; }

    .language-selector { position:relative; z-index:10000; }

    .lang-dropdown {
      display:none; position:fixed;
      background: var(--bg-dropdown);
      border: 1px solid var(--border-dropdown);
      border-radius:12px; box-shadow: var(--shadow-deep);
      z-index:99999; min-width:160px; overflow:hidden;
    }
    .lang-dropdown.active { display:block; animation: slideDown 0.18s ease; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

    .lang-option {
      padding:12px 16px; color: var(--text-suggestion);
      cursor:pointer; transition:all 0.15s; font-size:14px;
      display:flex; align-items:center; gap:10px;
    }
    .lang-option:hover { background: var(--bg-btn-hover); color: #E8A84B; }
    .lang-option.active { background: var(--bg-btn-hover); color: #E8A84B; font-weight:600; }

    /* CHAT */
    .chat-wrapper { flex:1; overflow:hidden; position:relative; min-height:0; }

    #chat {
      height:100%; min-height:0; padding:28px 36px;
      overflow-y:auto;
      background: var(--bg-chat);
      display:flex; flex-direction:column; gap:20px;
      scroll-behavior:smooth;
      transition: background 0.35s;
    }
    #chat::-webkit-scrollbar { width:6px; }
    #chat::-webkit-scrollbar-track { background:transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius:3px; }
    #chat::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

    /* MESSAGES */
    .message { display:flex; gap:14px; animation:fadeInUp 0.35s ease-out; max-width:82%; }
    .message.user { align-self:flex-end; flex-direction:row-reverse; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .message-avatar {
      width:36px; height:36px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:17px; flex-shrink:0; font-weight:700;
    }
    .user .message-avatar {
      background: var(--bg-brand-icon);
      border: 1px solid var(--border-brand);
      color: #E8A84B; font-size:13px; font-family:'DM Sans',sans-serif;
    }
    .bot .message-avatar {
      background: linear-gradient(135deg,#12181E,#1A242E);
      border: 1px solid rgba(201,122,58,0.4);
      font-size:18px;
      padding: 0;
      overflow: hidden;
    }
    .bot .message-avatar img {
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 10px;
      display: block;
    }
    [data-theme="light"] .bot .message-avatar {
      background: linear-gradient(135deg,#D8EAF4,#C0D8E8);
    }

    .message-content {
      padding:13px 17px; border-radius:16px;
      line-height:1.75; word-wrap:break-word;
      font-size:15px; border:1px solid transparent;
      transition: background 0.35s;
    }
    .message-content .text-part { white-space:pre-wrap; display:inline; }

    .user .message-content {
      background: linear-gradient(135deg, var(--bg-bubble-user-a), var(--bg-bubble-user-b));
      border-color: var(--border-bubble-user);
      color: var(--text-primary);
      border-radius: 16px 4px 16px 16px;
    }
    .bot .message-content {
      background: var(--bg-bubble-bot);
      border-color: var(--border-bubble-bot);
      color: var(--text-primary);
      border-radius: 4px 16px 16px 16px;
      box-shadow: var(--shadow-md);
    }

    .message-content strong { font-weight:600; color:#E8A84B; }
    .user .message-content strong { color:#C97A3A; }
    .message-content em { font-style:italic; color: var(--text-secondary); }
    .message-content code {
      background:rgba(0,0,0,0.12); padding:2px 7px; border-radius:5px;
      font-family:'JetBrains Mono',monospace; font-size:13px;
      color:#5A8FA8; border:1px solid rgba(90,143,168,0.2);
    }
    [data-theme="light"] .message-content code { background:rgba(0,0,0,0.05); }

    .message-content a { color:#E8A84B; text-decoration:none; border-bottom:1px solid rgba(232,168,75,0.4); transition:border-color 0.2s; }
    .message-content a:hover { border-color:#E8A84B; }

    .message-content img {
      max-width:100%; border-radius:10px; margin:10px 0;
      display:block; cursor:pointer;
      transition:transform 0.3s, box-shadow 0.3s;
      box-shadow: var(--shadow-md);
      border:1px solid rgba(255,255,255,0.08);
    }
    .message-content img:hover { transform:scale(1.02); box-shadow: var(--shadow-deep); }

    /* TIMESTAMP */
    .message-meta {
      display: flex;
      align-items: center;
      margin-top: 5px;
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.3px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .message:hover .message-meta { opacity: 1; }
    .message.user .message-meta { justify-content: flex-end; }
    .message.bot .message-meta { justify-content: flex-start; padding-left: 2px; }

    .error .message-content { background:rgba(192,57,43,0.08); color:#C0392B; border-color:rgba(192,57,43,0.2); }
    [data-theme="dark"] .error .message-content { color:#E57373; }


    /* COPY BUTTON */
    .message-wrapper { position: relative; }
    .copy-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 28px; height: 28px;
      background: var(--bg-btn);
      border: 1px solid var(--border-btn);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: all 0.18s;
      color: var(--text-muted);
      font-size: 13px;
      z-index: 2;
    }
    .bot .message-wrapper:hover .copy-btn { opacity: 1; }
    .copy-btn:hover {
      background: var(--bg-btn-hover);
      border-color: var(--border-btn-hover);
      color: var(--fossil-gold);
      transform: scale(1.08);
    }
    .copy-btn.copied {
      opacity: 1;
      color: #2ECC71;
      border-color: rgba(46,204,113,0.4);
      background: rgba(46,204,113,0.08);
    }

    /* MARKDOWN LISTS */
    .message-content ul,
    .message-content ol {
      margin: 8px 0 8px 20px;
      padding: 0;
      display: block;
    }
    .message-content ul { list-style: none; margin-left: 4px; }
    .message-content ol { list-style: decimal; margin-left: 20px; }
    .message-content ul li {
      padding: 3px 0 3px 20px;
      position: relative;
      display: block;
      line-height: 1.7;
    }
    .message-content ul li::before {
      content: '';
      position: absolute;
      left: 4px; top: 12px;
      width: 6px; height: 6px;
      background: linear-gradient(135deg, #C97A3A, #E8A84B);
      border-radius: 50%;
    }
    .message-content ol li {
      padding: 3px 0;
      line-height: 1.7;
    }
    .message-content h1, .message-content h2, .message-content h3 {
      font-family: 'Playfair Display', serif;
      color: var(--fossil-gold);
      margin: 14px 0 6px 0;
      line-height: 1.3;
    }
    .message-content h1 { font-size: 20px; }
    .message-content h2 { font-size: 17px; }
    .message-content h3 { font-size: 15px; font-weight: 600; }
    .message-content hr {
      border: none;
      border-top: 1px solid var(--border-btn);
      margin: 12px 0;
    }

    /* TYPING */
    .typing-indicator { display:flex; gap:5px; padding:4px 2px; align-items:center; }
    .typing-indicator span {
      width:7px; height:7px; border-radius:50%;
      background:#C97A3A; animation:typing 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay:0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
    @keyframes typing { 0%,60%,100%{opacity:0.2;transform:translateY(0)} 30%{opacity:1;transform:translateY(-5px)} }

    /* INPUT AREA */
    .input-container {
      padding:20px 36px 24px;
      background: var(--bg-input-area);
      border-top: 1px solid var(--border-input-area);
      display:flex; gap:12px; align-items:flex-end;
      border-radius:0 0 24px 24px; position:relative;
      transition: background 0.35s;
    }
    .input-container::before {
      content:''; position:absolute; top:0; left:36px; right:36px; height:1px;
      background: linear-gradient(90deg,transparent,rgba(201,122,58,0.3),transparent);
    }

    #input {
      flex:1; padding:13px 18px;
      border: 1px solid var(--border-input);
      border-radius:13px; font-size:15px;
      font-family:'DM Sans',sans-serif; font-weight:400;
      outline:none; transition:all 0.2s;
      resize:none; min-height:48px; max-height:130px;
      line-height:1.6;
      background: var(--bg-input); color: var(--text-primary);
      caret-color:#E8A84B;
    }
    #input::placeholder { color: var(--text-muted); }
    #input:focus {
      border-color: var(--border-input-focus);
      background: var(--bg-input-focus);
      box-shadow: 0 0 0 3px rgba(201,122,58,0.08);
    }

    /* SEND BUTTON */
    #send-btn {
      padding:0 24px; height:48px;
      background: linear-gradient(135deg,#C97A3A,#E8A84B);
      color:#0E0E12; border:none; border-radius:13px;
      cursor:pointer; font-size:14px; font-weight:600;
      font-family:'DM Sans',sans-serif; transition:all 0.2s;
      white-space:nowrap; letter-spacing:0.3px; flex-shrink:0;
      position:relative; overflow:hidden;
    }
    #send-btn::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent 60%);
      opacity:0; transition:opacity 0.2s;
    }
    #send-btn:hover:not(:disabled)::before { opacity:1; }
    #send-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 20px rgba(201,122,58,0.4); }
    #send-btn:active:not(:disabled) { transform:translateY(0); }
    #send-btn:disabled {
      background:linear-gradient(135deg,rgba(201,122,58,0.35),rgba(232,168,75,0.35));
      color:rgba(14,14,18,0.5); cursor:not-allowed;
    }

    /* STOP BUTTON */
    #stop-btn {
      display:none; padding:0 20px; height:48px;
      background:rgba(192,57,43,0.1);
      color:#E57373;
      border:1px solid rgba(192,57,43,0.3);
      border-radius:13px; cursor:pointer;
      font-size:14px; font-weight:600;
      font-family:'DM Sans',sans-serif; transition:all 0.2s;
      white-space:nowrap; flex-shrink:0;
      align-items:center; gap:8px;
    }
    #stop-btn.visible {
      display:flex;
      animation:popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
    #stop-btn:hover {
      background:rgba(192,57,43,0.18);
      border-color:rgba(192,57,43,0.55);
      color:#EF5350; transform:translateY(-1px);
    }
    [data-theme="light"] #stop-btn { color:#C0392B; border-color:rgba(192,57,43,0.25); }
    [data-theme="light"] #stop-btn:hover { color:#922B21; }

    .stop-square { width:9px; height:9px; background:currentColor; border-radius:2px; flex-shrink:0; }

    /* EMPTY STATE */
    .empty-state {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      height:100%; text-align:center; padding:40px 50px;
    }

    .empty-icon-ring {
      position:relative; width:110px; height:110px; margin-bottom:28px;
    }
    .empty-icon-ring::before {
      content:''; position:absolute; inset:0; border-radius:50%;
      border:1px solid rgba(201,122,58,0.3);
      animation:spin 8s linear infinite;
    }
    .empty-icon-ring::after {
      content:''; position:absolute; inset:8px; border-radius:50%;
      border:1px dashed rgba(232,168,75,0.2);
      animation:spin 12s linear infinite reverse;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    .empty-state-icon {
      position:absolute; inset:0;
      background: var(--bg-empty-icon);
      border: 1px solid var(--border-brand);
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:44px; box-shadow: var(--glow-copper);
      transition: background 0.35s;
    }

    .empty-state h2 {
      font-family:'Playfair Display',serif;
      font-size:30px; font-weight:700;
      color: var(--text-heading); margin-bottom:10px;
      letter-spacing:-0.5px; transition:color 0.35s;
    }
    .empty-state h2 span {
      background:linear-gradient(135deg,#C97A3A,#F5C76A);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .empty-state > p { font-size:15px; max-width:440px; line-height:1.75; color:var(--text-muted); font-weight:300; }

    .empty-divider {
      width:60px; height:1px;
      background:linear-gradient(90deg,transparent,#C97A3A,transparent);
      margin:22px auto 16px;
    }

    .empty-state-subtitle {
      font-size:11px; color: var(--text-sub); font-weight:600;
      letter-spacing:2px; text-transform:uppercase; margin-bottom:18px;
    }

    .suggestions {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:10px; width:100%; max-width:700px;
    }

    .suggestion-card {
      background: var(--bg-suggestion);
      border: 1px solid var(--border-suggestion);
      border-radius:12px; padding:13px 16px; cursor:pointer;
      transition:all 0.2s; text-align:left; font-size:13.5px;
      color: var(--text-suggestion); line-height:1.5;
      display:flex; align-items:flex-start; gap:10px;
    }
    .suggestion-card:hover {
      background: var(--bg-suggestion-hover);
      border-color: var(--border-suggestion-hover);
      color: var(--text-suggestion-hover);
      transform:translateY(-2px); box-shadow: var(--shadow-md);
    }
    .suggestion-icon { font-size:18px; flex-shrink:0; margin-top:1px; }

    /* IMAGE MODAL */
    .image-modal {
      display:none; position:fixed; z-index:1000; inset:0;
      background:rgba(0,0,0,0.95); align-items:center; justify-content:center;
      cursor:zoom-out; backdrop-filter:blur(8px); padding:20px;
    }
    .image-modal.active { display:flex; animation:fadeIn 0.25s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .image-modal img {
      max-width:95%; max-height:95%; border-radius:8px;
      box-shadow:0 20px 60px rgba(0,0,0,0.8); object-fit:contain;
      transition:transform 0.1s ease-out; user-select:none;
      -webkit-user-drag:none; border:1px solid rgba(255,255,255,0.06);
    }

    .modal-close {
      position:absolute; top:24px; right:24px; color:rgba(255,255,255,0.6);
      font-size:28px; cursor:pointer; width:44px; height:44px;
      display:flex; align-items:center; justify-content:center;
      background:rgba(255,255,255,0.06); border-radius:10px;
      transition:all 0.2s; z-index:1001; border:1px solid rgba(255,255,255,0.1);
    }
    .modal-close:hover { background:rgba(255,255,255,0.12); color:white; }

    .modal-info {
      position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
      color:rgba(255,255,255,0.5); background:rgba(0,0,0,0.6);
      padding:8px 18px; border-radius:20px; font-size:12px;
      white-space:nowrap; border:1px solid rgba(255,255,255,0.08);
    }

    /* CONNECTION STATUS */
    .connection-status {
      position:absolute; top:14px; right:14px;
      padding:6px 12px; border-radius:8px; font-size:12px; font-weight:600;
      display:none; z-index:1000; font-family:'JetBrains Mono',monospace;
    }
    .connection-status.error {
      display:block; background:rgba(192,57,43,0.1);
      color:#E57373; border:1px solid rgba(192,57,43,0.25);
    }

    /* RESPONSIVE */
    @media (max-width:768px) {
      body {
        padding: 0;
        overflow: hidden;
        height: 100vh;
        height: 100dvh;
        height: -webkit-fill-available;
      }
      .container {
        height: 100vh;
        height: 100dvh;
        height: -webkit-fill-available;
        border-radius: 0;
        max-width: 100%;
        border: none;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .header {
        padding: 14px 16px;
        border-radius: 0;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        overflow: visible;
        flex-shrink: 0;
      }
      .header-controls { width:100%; flex-wrap:wrap; }
      .icon-btn { flex:1; justify-content:center; padding: 8px 12px; font-size: 12px; }
      .brand-text h1 { font-size: 22px; }
      .brand-text p { font-size: 12px; }
      .brand-icon { width: 40px; height: 40px; font-size: 22px; }
      .chat-wrapper {
        flex: 1;
        overflow: hidden;
        min-height: 0;
        position: relative;
      }
      #chat {
        padding: 16px;
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }
      .input-container {
        padding: 12px 16px 16px;
        border-radius: 0;
        flex-shrink: 0;
        /* safe area for devices with home indicator */
        padding-bottom: max(16px, env(safe-area-inset-bottom));
      }
      .message { max-width: 92%; }
      .suggestions { grid-template-columns: 1fr; }
      .empty-state { padding: 20px 16px; }
      .empty-icon-ring { width: 80px; height: 80px; margin-bottom: 18px; }
      .empty-state-icon { font-size: 32px; }
      .empty-state h2 { font-size: 22px; }
      .empty-state > p { font-size: 14px; }
    }
  </style>
</head>

  // ── THEME ──────────────────────────────────────────────

  function toggleTheme() {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';

  function applyTheme() {

    document.getElementById('theme-icon').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
  }

  function loadTheme() {
    try {
      const saved = localStorage.getItem('rocky-theme');
      if (saved === 'light' || saved === 'dark') { currentTheme = saved; applyTheme(); }
    } catch(e) {}
  }

  // ── STOP STREAMING ─────────────────────────────────────

  function stopStreaming() {
    if (streamController) { streamController.abort(); }
  }

  function showStopBtn() {
    document.getElementById('stop-btn').classList.add('visible');
    document.getElementById('send-btn').style.display = 'none';
  }

  function hideStopBtn() {
    document.getElementById('stop-btn').classList.remove('visible');
    document.getElementById('send-btn').style.display = '';
  }

  // ── TRANSLATIONS ───────────────────────────────────────

  const translations = {

        { icon: "🌋", text: "Explain how volcanoes form and erupt" },
        { icon: "🦴", text: "Tell me about fossils and paleontology" },
        { icon: "⛰️", text: "What causes earthquakes and how are they measured?" }
      ]
    },
    es: {
      newChat: "Nuevo Chat", sendButton: "Enviar →", stopButton: "Detener",
      inputPlaceholder: "Pregunta sobre geología, rocas, minerales, fósiles...",
      welcomeTitle: "Bienvenido a Rocky",
      welcomeText: "Tu compañero de IA para explorar el fascinante mundo de la geología, minerales y ciencias de la Tierra.",
      suggestionsTitle: "Temas Populares",

      ]
    }

  function toggleLanguageMenu() {
    const dropdown = document.getElementById('lang-dropdown');
    const button = event.target.closest('.icon-btn');
    if (dropdown.classList.contains('active')) {
      dropdown.classList.remove('active');
      document.removeEventListener('click', closeLangMenuOutside);
    } else {
      const rect = button.getBoundingClientRect();
      dropdown.style.top = (rect.bottom + 8) + 'px';
      dropdown.style.right = (window.innerWidth - rect.right) + 'px';
      dropdown.classList.add('active');
      setTimeout(() => document.addEventListener('click', closeLangMenuOutside), 0);
    }
  }

  function closeLangMenuOutside(e) {
    const dropdown = document.getElementById('lang-dropdown');
    if (!document.querySelector('.language-selector').contains(e.target)) {
      dropdown.classList.remove('active');
      document.removeEventListener('click', closeLangMenuOutside);
    }
  }

  function changeLanguage(lang) {
    currentLanguage = lang;
    document.getElementById('current-lang').textContent = lang.toUpperCase();
    document.getElementById('lang-dropdown').classList.remove('active');
    updateTranslations();
    document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
    event.target.closest('.lang-option').classList.add('active');
  }

  function updateTranslations() {
    const t = translations[currentLanguage];
    document.querySelectorAll('[data-lang-key]').forEach(el => {
      const key = el.getAttribute('data-lang-key');
      if (t[key]) el.textContent = t[key];
    });
    document.getElementById('input').placeholder = t.inputPlaceholder;
    const sc = document.getElementById('suggestions-container');
    if (sc) sc.innerHTML = t.suggestions.map(s =>
      `<div class="suggestion-card" onclick="sendSuggestion('${s.text.replace(/'/g,"\\'")}')">
        <span class="suggestion-icon">${s.icon}</span><span>${s.text}</span>
      </div>`
    ).join('');
  }

  // ── AUTO-RESIZE ────────────────────────────────────────

  const inputEl = document.getElementById("input");
  inputEl.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 130) + "px";
  });

  // ── RENDERING ──────────────────────────────────────────

  function renderContent(container, text) {
    const imageRegex = /!\[([^\]]*)\]\((https?:\/\/[^\)]+)\)/g;
    container.innerHTML = '';
    let lastIndex = 0, match;
    const images = [];
    while ((match = imageRegex.exec(text)) !== null)
      images.push({ index: match.index, endIndex: imageRegex.lastIndex, url: match[2], alt: match[1] });
    images.forEach(img => {
      const textBefore = text.slice(lastIndex, img.index);
      if (textBefore.trim()) { const s = document.createElement('span'); s.className='text-part'; s.innerHTML=renderMarkdown(textBefore); container.appendChild(s); }
      const imgEl = document.createElement('img');
      imgEl.src=img.url; imgEl.alt=img.alt||'Geological Illustration'; imgEl.loading='lazy';
      imgEl.onclick = e => { e.stopPropagation(); openImageModal(img.url); };
      container.appendChild(imgEl);
      lastIndex = img.endIndex;
    });
    const after = text.slice(lastIndex);
    if (after.trim()) { const s = document.createElement('span'); s.className='text-part'; s.innerHTML=renderMarkdown(after); container.appendChild(s); }
  }

  function renderMarkdown(text) {
    // Process line by line for block elements, then inline
    const lines = text.split('\n');
    const result = [];
    let inUl = false, inOl = false;

    for (let i = 0; i < lines.length; i++) {
      let line = escapeHtml(lines[i]);

      // Headers
      if (/^### (.+)/.test(line)) { closeList(); result.push('<h3>' + line.replace(/^### /, '') + '</h3>'); continue; }
      if (/^## (.+)/.test(line))  { closeList(); result.push('<h2>' + line.replace(/^## /, '') + '</h2>'); continue; }
      if (/^# (.+)/.test(line))   { closeList(); result.push('<h1>' + line.replace(/^# /, '') + '</h1>'); continue; }

      // Horizontal rule
      if (/^---+$/.test(line.trim())) { closeList(); result.push('<hr>'); continue; }

      // Unordered list
      const ulMatch = line.match(/^[\*\-] (.+)/);
      if (ulMatch) {
        if (!inUl) { if(inOl){result.push('</ol>'); inOl=false;} result.push('<ul>'); inUl=true; }
        result.push('<li>' + inlineMarkdown(ulMatch[1]) + '</li>');
        continue;
      }

      // Ordered list
      const olMatch = line.match(/^\d+\.\s+(.+)/);
      if (olMatch) {
        if (!inOl) { if(inUl){result.push('</ul>'); inUl=false;} result.push('<ol>'); inOl=true; }
        result.push('<li>' + inlineMarkdown(olMatch[1]) + '</li>');
        continue;
      }

      // Close open lists on blank or regular line
      closeList();
      if (line.trim() === '') { result.push('<br>'); }
      else { result.push(inlineMarkdown(line) + '<br>'); }
    }

    closeList();
    return result.join('');

    function closeList() {
      if (inUl) { result.push('</ul>'); inUl = false; }
      if (inOl) { result.push('</ol>'); inOl = false; }
    }
  }

  function inlineMarkdown(text) {
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
    text = text.replace(/\*([^\*\s][^\*]*?)\*/g, '<em>$1</em>');
    text = text.replace(/_([^_\s][^_]*?)_/g, '<em>$1</em>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    return text;
  }

  // ── IMAGE MODAL ────────────────────────────────────────

  let modalZoom=1, modalPanning=false, modalPanStart={x:0,y:0}, modalPanOffset={x:0,y:0};

  function openImageModal(src) {
    const modal = document.getElementById("image-modal");
    const mi = document.getElementById("modal-image");
    modalZoom=1; modalPanOffset={x:0,y:0};
    mi.src=src; mi.style.transform='scale(1) translate(0,0)';
    modal.classList.add("active");
    mi.onwheel = e => { e.preventDefault(); modalZoom*=e.deltaY>0?0.9:1.1; modalZoom=Math.max(0.5,Math.min(modalZoom,5)); updateModalTransform(); };
    mi.onmousedown = e => { if(modalZoom>1){modalPanning=true; modalPanStart={x:e.clientX-modalPanOffset.x,y:e.clientY-modalPanOffset.y}; mi.style.cursor='grabbing'; e.preventDefault();} };
    document.onmousemove = e => { if(modalPanning){modalPanOffset={x:e.clientX-modalPanStart.x,y:e.clientY-modalPanStart.y}; updateModalTransform();} };
    document.onmouseup = () => { if(modalPanning){modalPanning=false; if(modalZoom>1)mi.style.cursor='grab';} };
    mi.style.cursor=modalZoom>1?'grab':'default';
    modal.onclick = e => { if(e.target===modal) closeImageModal(); };
  }

  function updateModalTransform() {
    const mi = document.getElementById("modal-image");
    mi.style.transform=`scale(${modalZoom}) translate(${modalPanOffset.x/modalZoom}px,${modalPanOffset.y/modalZoom}px)`;
    mi.style.cursor=modalZoom>1?'grab':'default';
  }

  function closeImageModal(event) {
    if(event) event.stopPropagation();
    const modal=document.getElementById("image-modal"), mi=document.getElementById("modal-image");
    modal.classList.remove("active");
    mi.onwheel=mi.onmousedown=document.onmousemove=document.onmouseup=modal.onclick=null;
    modalZoom=1; modalPanning=false; modalPanOffset={x:0,y:0};
  }

NCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhGjRo0IRo0aNCEaNGjQhf/9k=" alt="Rocky"></div><div class="message-wrapper"><div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div><div class="message-meta" id="bot-ts-pending"></div></div>`;
    chat.appendChild(botMsg); chat.scrollTop=chat.scrollHeight;
    const responseContent=botMsg.querySelector('.message-content');

    try {
      streamController=new AbortController();
      const timeoutId=setTimeout(()=>streamController.abort(),120000);

      const res=await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:fullMessage,thread_id}),
        signal:streamController.signal
      });
      clearTimeout(timeoutId);

      if(!res.ok){
        let e=`Server error (${res.status})`;
        if(res.status===429) e=currentLanguage==='es'?"Demasiadas solicitudes.":"Too many requests. Please wait.";
        else if(res.status>=500) e=currentLanguage==='es'?"Error del servidor.":"Server error. Try again.";
        throw new Error(e);
      }

      responseContent.innerHTML=''; hideConnectionError(); connectionRetries=0;

      const reader=res.body.getReader(), decoder=new TextDecoder();
      let buffer='', fullText='';

      while(true){
        const {done,value}=await reader.read();
        if(done) break;
        buffer+=decoder.decode(value,{stream:true});
        const lines=buffer.split('\n'); buffer=lines.pop()||'';
        for(const line of lines){
          if(line.startsWith('data: ')){
            const data=line.slice(6).trim();
            if(data==='[DONE]') continue;
            try{
              const parsed=JSON.parse(data);
              if(parsed.thread_id) thread_id=parsed.thread_id;
              else if(parsed.content){ fullText+=parsed.content; renderContent(responseContent,fullText); chat.scrollTop=chat.scrollHeight; }
              else if(parsed.error) throw new Error(parsed.error);
            }catch(e){ if(e.message!=="Unexpected end of JSON input") console.warn("Parse warn:",data); }
          }
        }
      }

      if(!fullText.trim()) throw new Error(currentLanguage==='es'?"Sin respuesta":"No response from server");
      // Add copy button and finalize timestamp
      addCopyButton(botMsg, fullText);
      const tsPending = botMsg.querySelector('#bot-ts-pending');
      if (tsPending) { tsPending.removeAttribute('id'); tsPending.textContent = getTimestamp(); }

    } catch(error) {
      if(error.name==='AbortError'){
        // User hit stop — keep partial response if any, add a stopped tag
        const hasContent=responseContent.innerHTML&&!responseContent.querySelector('.typing-indicator');
        if(hasContent){
          const badge=document.createElement('span');
          badge.style.cssText='display:inline-block;margin-left:8px;font-size:11px;padding:2px 8px;border-radius:4px;vertical-align:middle;font-family:DM Sans,sans-serif;background:rgba(201,122,58,0.1);border:1px solid rgba(201,122,58,0.22);color:var(--text-muted)';
          badge.textContent=currentLanguage==='es'?'⏹ detenido':'⏹ stopped';
          responseContent.appendChild(badge);
          addCopyButton(botMsg, responseContent.innerText);
          const tsP2 = botMsg.querySelector('#bot-ts-pending'); if(tsP2){tsP2.removeAttribute('id'); tsP2.textContent=getTimestamp();}
        } else {
          botMsg.remove();
        }
      } else {
        let errorMsg=error.message;
        if(!navigator.onLine) errorMsg=currentLanguage==='es'?"Sin conexión a internet.":"No internet connection.";
        botMsg.className='message error';
        botMsg.innerHTML=`<div class="message-avatar">!</div><div class="message-content"><strong>Error:</strong> ${escapeHtml(errorMsg)}</div>`;
        connectionRetries<MAX_RETRIES
          ?(connectionRetries++, showConnectionError(`Connection issue (${connectionRetries}/${MAX_RETRIES})`))
          :showConnectionError("Unable to connect.");
      }
    } finally {
      inp.disabled=false; sendBtn.disabled=false; isConnecting=false;
      streamController=null; hideStopBtn(); inp.focus(); chat.scrollTop=chat.scrollHeight;
    }
  }

  // ── UTILS ──────────────────────────────────────────────

  function addCopyButton(msgEl, plainText) {
    const wrapper = msgEl.querySelector('.message-wrapper');
    if (!wrapper || wrapper.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.title = 'Copy response';
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    btn.onclick = () => {
      const content = wrapper.querySelector('.message-content');
      const text = content ? content.innerText : plainText;
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
        }, 2000);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = content ? content.innerText : plainText;
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        btn.classList.add('copied');
        setTimeout(() => btn.classList.remove('copied'), 2000);
      });
    };
    wrapper.appendChild(btn);
  }

  function escapeHtml(text){ const d=document.createElement('div'); d.textContent=text; return d.innerHTML; }

  function getTimestamp() {
    const now = new Date();
    return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  inputEl.addEventListener("keypress",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape"){closeImageModal();document.getElementById('lang-dropdown').classList.remove('active');} });

  window.addEventListener('DOMContentLoaded',()=>{ loadTheme(); updateTranslations(); inputEl.focus(); });
</script>
